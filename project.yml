name: Frostline
options:
  bundleIdPrefix: com.shimondeitel.frostline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Frostline:
    type: application
    platform: iOS
    sources:
      - path: Frostline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.frostline
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Frostline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FrostlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FrostlineTests
      - path: Frostline.storekit
    dependencies:
      - target: Frostline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.frostline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
  FrostlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FrostlineUITests
    dependencies:
      - target: Frostline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.frostline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  Frostline:
    build:
      targets:
        Frostline: all
        FrostlineTests: [test]
        FrostlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Frostline.storekit
    test:
      config: Debug
      storeKitConfiguration: Frostline.storekit
      targets:
        - FrostlineTests
        - FrostlineUITests
    archive:
      config: Release
